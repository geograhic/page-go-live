*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;border-radius:0!important;}
html,body{width:100%;min-height:100%;overflow-x:hidden;overflow-y:auto;background:#000;font-family:'SF Pro Display','PingFang SC','-apple-system','Segoe UI',sans-serif;color:#e8e8f0;cursor:default;-webkit-font-smoothing:antialiased;}

/* --- layer 0: real NASA poster (instant, no JS needed) --- */
#poster{position:fixed;inset:0;z-index:0;width:100%;height:100%;object-fit:cover;object-position:center;opacity:.92;pointer-events:none;}

/* --- layer 1: NASA ISS 4K video (lazy-loaded) --- */
#bgvideo{position:fixed;inset:0;z-index:1;width:100%;height:100%;object-fit:cover;object-position:center;opacity:0;filter:saturate(1.05) contrast(1.04);transition:opacity 2s ease;pointer-events:none;}
#bgvideo.visible{opacity:.85;}

/* --- layer 2: canvas cosmic overlay (stars/nebula/shooting) --- */
#cosmos{position:fixed;inset:0;z-index:2;width:100%;height:100%;pointer-events:none;}

/* --- layer 3: depth + legibility gradient --- */
#overlay{position:fixed;inset:0;z-index:3;background:
  radial-gradient(ellipse 120% 80% at 50% 30%, rgba(20,30,70,.12) 0%, transparent 55%),
  linear-gradient(180deg, rgba(0,0,0,.35) 0%, rgba(0,0,0,.15) 40%, rgba(0,0,0,.6) 100%);
  pointer-events:none;}

.stage{position:relative;z-index:4;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:2.5rem;padding-left:1.5rem;padding-right:1.5rem;padding-bottom:4rem;min-height:100vh;text-align:center;}

.badge{display:inline-block;padding:.32rem .85rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(175,185,225,.82);font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;backdrop-filter:blur(10px);margin-bottom:2.2rem;}

.title-block{max-width:720px;}
h1{font-size:clamp(2.6rem,6.5vw,5.2rem);font-weight:800;letter-spacing:-.025em;line-height:1.06;background:linear-gradient(135deg,#a5b4fc 0%,#c084fc 30%,#60a5fa 65%,#93c5fd 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.35rem;text-shadow:0 0 40px rgba(120,140,255,.25);}
.subtitle{font-size:clamp(.9rem,1.8vw,1.15rem);color:rgba(200,210,245,.66);font-weight:300;letter-spacing:.05em;margin-bottom:2.4rem;}

.guide{display:flex;flex-direction:row;flex-wrap:nowrap;gap:.85rem;justify-content:center;max-width:920px;margin-bottom:2.4rem;width:100%;}

.gi::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,#a78bfa,#6366f1);}

.gi-l{font-size:.8rem;font-weight:600;color:rgba(218,213,248,.9);margin-bottom:.28rem;}
.gi-d{font-size:.7rem;color:rgba(168,162,208,.54);line-height:1.55;}

.cta-row{display:flex;gap:.85rem;flex-wrap:wrap;justify-content:center;align-items:center;max-width:680px;}
.btn{padding:.82rem 1.7rem;font-size:.8rem;font-weight:600;letter-spacing:.03em;text-decoration:none;border:1px solid transparent;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:.45rem;}
.btn-p{background:linear-gradient(135deg,#2563eb,#6366f1);color:#fff;border-color:rgba(120,130,255,.4);}
.btn-p:hover{background:linear-gradient(135deg,#3b78f0,#7c7ff3);box-shadow:0 0 30px rgba(60,90,230,.35);}
.btn-s{background:rgba(255,255,255,.04);color:rgba(210,215,250,.92);border-color:rgba(140,160,255,.28);backdrop-filter:blur(8px);}
.btn-s:hover{color:#fff;border-color:rgba(150,170,255,.5);background:rgba(255,255,255,.08);box-shadow:0 0 22px rgba(90,120,255,.2);}
.btn-g{background:transparent;color:rgba(198,193,235,.72);border-color:rgba(158,153,212,.22);}
.btn-g:hover{color:#fff;border-color:rgba(175,170,228,.45);background:rgba(255,255,255,.03);}

.note{position:fixed;bottom:1.05rem;left:50%;transform:translateX(-50%);z-index:5;font-size:.6rem;color:rgba(150,145,188,.32);letter-spacing:.02em;text-align:center;white-space:nowrap;}
.scanline{position:fixed;inset:0;z-index:5;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.0025) 2px,rgba(255,255,255,.0025) 4px);}

@media(max-width:720px){
  html,body{overflow-y:auto;overflow-x:hidden;}
  .stage{padding-top:1.8rem;padding-left:1rem;padding-right:1rem;padding-bottom:3.5rem;justify-content:flex-start;gap:0;}
  .badge{margin-bottom:1.4rem;padding:.26rem .7rem;font-size:.62rem;}
  .title-block{margin-bottom:.6rem;}
  h1{margin-bottom:.2rem;}
  .subtitle{margin-bottom:1.4rem;}
  .guide{flex-wrap:wrap;gap:.55rem;margin-bottom:1.5rem;} .gi{flex:1 1 220px;min-width:0;padding:.8rem .75rem;}
  .gi-n{font-size:1.35rem;margin-bottom:.2rem;}
  .gi-l{font-size:.74rem;margin-bottom:.18rem;}
  .gi-d{font-size:.64rem;line-height:1.45;}
  .cta-row{flex-direction:column;width:100%;max-width:340px;gap:.55rem;} .btn{width:100%;justify-content:center;padding:.7rem 1.2rem;font-size:.76rem;}
  .note{position:relative;bottom:auto;left:auto;transform:none;margin-top:1.8rem;white-space:normal;padding:0 1rem;}
}
@media(max-width:520px){
  .stage{padding-top:1.4rem;padding-left:.75rem;padding-right:.75rem;padding-bottom:3rem;}
  .badge{margin-bottom:1.1rem;font-size:.58rem;}
  .title-block{margin-bottom:.4rem;}
  h1{font-size:clamp(2rem,9vw,3.4rem);}
  .subtitle{font-size:clamp(.82rem,3.2vw,1rem);margin-bottom:1.1rem;}
  .guide{flex-direction:column;gap:.45rem;margin-bottom:1.2rem;} .gi{flex:1 1 auto;padding:.7rem .7rem;}
  .gi-n{font-size:1.15rem;}
  .gi-l{font-size:.7rem;margin-bottom:.14rem;}
  .gi-d{font-size:.6rem;line-height:1.4;}
  .cta-row{max-width:100%;gap:.45rem;} .btn{padding:.62rem 1rem;font-size:.72rem;}
  .note{font-size:.52rem;margin-top:1.4rem;padding:0 .6rem;}
}

<body>

<!-- Layer 0: real NASA EPIC Earth poster (instant paint) -->
<img id="poster" src="poster.jpg" alt="" aria-hidden="true">

<!-- Layer 1: NASA ISS 4K video (loaded by adaptive engine) -->
<video id="bgvideo" autoplay muted loop playsinline preload="none"></video>

<!-- Layer 2+ -->
<canvas id="cosmos"></canvas>
<div id="overlay"></div>
<div class="scanline"></div>

<div class="stage">
  <div class="badge">Endril &middot; Tools</div>
  <div class="title-block">
    <h1>Solar System</h1>
    <p class="subtitle">以光年丈量宇宙 &middot; 用指尖触碰星辰</p>
  </div>
  <div class="guide">
    <div class="gi"><div class="gi-n">01</div><div class="gi-l">真实轨道数据</div><div class="gi-d">NASA JPL 星历驱动<br>八大行星实时位置模拟</div></div>
    <div class="gi"><div class="gi-n">02</div><div class="gi-l">沉浸式探索</div><div class="gi-d">自由缩放 &middot; 时间加速<br>从太阳到冥王星一镜到底</div></div>
    <div class="gi"><div class="gi-n">03</div><div class="gi-l">航天科学</div><div class="gi-d">NASA Eyes / 开源项目<br>MIT 协议 &middot; 三维交互</div></div>
  </div>
  <div class="cta-row">
    <a href="https://eyes.nasa.gov/apps/solar-system/#/sun" class="btn btn-p" target="_blank" rel="noopener">&#9654; NASA Eyes 太阳系</a>
    <a href="https://github.com/hyqzz/Solar-Wanderer" class="btn btn-s" target="_blank" rel="noopener">Solar-Wanderer 源码</a>
    <a href="https://endril.com" class="btn btn-g" target="_blank" rel="noopener">返回 Endril</a>
  </div>
</div>

<div class="note">背景影像：NASA ISS Ultra-HD Earth / DSCOVR EPIC（公共领域） &middot; svs.gsfc.nasa.gov / epic.gsfc.nasa.gov</div>

<script>
(function(){
/* ============================================================
 * ADAPTIVE VIDEO ENGINE
 * - Lazy loads after page interactive (poster shows instantly)
 * - Uses Network Information API for initial quality selection
 * - All sources are real NASA public-domain ISS Earth videos
 * - Auto-upgrades to 4K when bandwidth allows (adaptive bitrate)
 * - Pauses when tab hidden (saves bandwidth)
 * ============================================================ */

var V = document.getElementById('bgvideo');
var P = document.getElementById('poster');

// Real NASA ISS Earth video renditions (all public domain)
var SRC = {
  '4K' : 'https://svs.gsfc.nasa.gov/vis/a030000/a030600/a030623/iss_red_camera_2015_3840x1920.mp4',
  '1080':'https://svs.gsfc.nasa.gov/vis/a030000/a030600/a030623/iss_red_camera_2015_1080p.mp4',
  '720':'https://svs.gsfc.nasa.gov/vis/a030000/a030600/a030623/iss_red_camera_2015_720p.mp4'
};

// Detect optimal starting quality via Network Information API
function pickInitialQuality(){
  var conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  if(!conn) return '4K'; // no API → assume good net, aim for best

  if(conn.saveData) return '720';
  var t = conn.effectiveType||'';
  if(t==='slow-2g'||t==='2g') return '720';
  if(t==='3g') return '1080';
  if(t==='4g'){
    var d = conn.downlink; // Mbps estimate
    if(d>=15) return '4K';      // fast 4G → go 4K
    if(d>=5)  return '1080';     // decent 4G → 1080 first, upgrade later
    return '720';               // weak 4G
  }
  return '4K'; // unknown → optimistic
}

// Load and play a given quality
function loadAndPlay(q){
  V.src = SRC[q];
  V.load();
  var p = V.play();
  if(p)p.catch(function(){ /* autoplay may need interaction */ });
}

// Show video (crossfade from poster)
function revealVideo(){
  V.classList.add('visible');
  setTimeout(function(){ P.style.display='none'; },2200);
}

// Upgrade to 4K when current source plays stably
function maybeUpgradeTo4K(currentQ){
  if(currentQ==='4K')return;
  var upgradeTimer;
  var stallCount=0;

  // Monitor for stalls (buffer underruns)
  V.addEventListener('waiting',function(){stallCount++;});
  V.addEventListener('playing',function(){
    // Reset timer each time we resume playing
    clearTimeout(upgradeTimer);
    // If playing stably for 10s with ≤1 stall, upgrade
    upgradeTimer=setTimeout(function(){
      if(stallCount<=1 && !document.hidden){
        upgradeTo4K();
      }
    },10000);
  });
}

// Seamless upgrade to 4K: preload hidden, then swap
function upgradeTo4K(){
  var hV=document.createElement('video');
  hV.muted=true;hV.preload='auto';hV.crossOrigin='anonymous';
  hV.src=SRC['4K'];
  hV.addEventListener('canplaythrough',function(){
    // Match current playback position
    var t=V.currentTime||0;
    V.src=SRC['4K'];V.load();
    V.currentTime=t;
    V.play().catch(function(){});
    hV.remove();
  },{once:true});
}

// Visibility: pause/resume (save bandwidth)
document.addEventListener('visibilitychange',function(){
  if(document.hidden){try{V.pause();}catch(e){}
  }else{try{V.play().catch(function(){});}catch(e){}
  }
});

// Error handling: keep poster visible if all video fails
V.addEventListener('error',function(){
  // poster stays visible, cosmic canvas still runs
});

/* ---- Adaptive bootstrap sequence ---- */
var Q=pickInitialQuality();

// Delayed lazy load: let poster paint first, then load video
if(document.readyState==='complete'){
  initVideo(Q);
}else{
  window.addEventListener('load',function(){initVideo(Q);});
}

function initVideo(q){
  // Small delay to ensure poster is painted
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      loadAndPlay(q);

      // Crossfade when video has enough data
      function onCanPlay(){
        revealVideo();
        try{V.playbackRate=0.7;}catch(e){}
        maybeUpgradeTo4K(q);
        V.removeEventListener('canplay',onCanPlay);
        V.removeEventListener('loadeddata',onCanPlay);
      }
      V.addEventListener('canplay',onCanPlay,{once:true});
      V.addEventListener('loadeddata',onCanPlay,{once:true});

      // Fallback: if canplay never fires (some browsers), show after timeout
      setTimeout(function(){
        if(!V.classList.contains('visible'))revealVideo();
      },12000);
    });
  });
}


/* ============================================================
 * COSMIC CANVAS OVERLAY (stars / nebula / shooting stars)
 * Runs independently of video state
 * ============================================================ */
var c=document.getElementById('cosmos'),ctx=c.getContext('2d');
var W,H,T=0;
var stars=[],nebulas=[];

function resize(){W=c.width=innerWidth;H=c.height=innerHeight;initAll();}
window.addEventListener('resize',resize);
function rand(a,b){return a+Math.random()*(b-a);}

function initStars(){
  stars=[];
  for(var i=0;i<300;i++)stars.push({x:rand(0,W),y:rand(0,H),r:rand(.15,.55),a:rand(.06,.38),sp:rand(.0003,.001),tw:rand(.8,1.4),ph:rand(0,Math.PI*2)});
  for(var i=0;i<70;i++)stars.push({x:rand(0,W),y:rand(0,H),r:rand(.4,1.1),a:rand(.18,.5),sp:rand(.0008,.0018),tw:rand(1.2,2.2),ph:rand(0,Math.PI*2),big:true});
}
function initNebulas(){
  nebulas=[
    {x:W*.2,y:H*.18,r:Math.min(W,H)*.4,c:'rgba(90,60,200,',a:.05},
    {x:W*.8,y:H*.8,r:Math.min(W,H)*.32,c:'rgba(30,80,180,',a:.045},
    {x:W*.55,y:H*.4,r:Math.min(W,H)*.25,c:'rgba(150,50,130,',a:.035}
  ];
}
function initAll(){initStars();initNebulas();}

function drawNebula(n){
  ctx.globalCompositeOperation='screen';
  var g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
  g.addColorStop(0,n.c+n.a+')');g.addColorStop(1,n.c+'0)');
  ctx.fillStyle=g;ctx.fillRect(n.x-n.r,n.y-n.r,n.r*2,n.r*2);
  ctx.globalCompositeOperation='source-over';
}
function drawStar(s){
  var tw=Math.sin(T*s.tw+s.ph)*.5+.5;
  var al=s.a*(.35+tw*.65);
  ctx.globalAlpha=al;
  if(s.big){
    var g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*3.2);
    g.addColorStop(0,'rgba(225,230,255,1)');g.addColorStop(.4,'rgba(170,185,255,.35)');g.addColorStop(1,'rgba(150,170,255,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(s.x,s.y,s.r*3.2,0,Math.PI*2);ctx.fill();
  }else{
    ctx.fillStyle='#e6ebff';ctx.fillRect(s.x,s.y,s.r,s.r);
  }
  ctx.globalAlpha=1;
}

// shooting star
var shooter={active:false,x:0,y:0,dx:0,dy:0,life:0,len:0};
function maybeShooter(){
  if(!shooter.active&&Math.random()<.0025){
    shooter.active=true;shooter.x=rand(0,W*.7);shooter.y=rand(0,H*.45);
    var ang=rand(.18,.55);shooter.len=rand(70,180);
    shooter.dx=Math.cos(ang)*13;shooter.dy=Math.sin(ang)*13;shooter.life=1;
  }
}
function drawShooter(){
  if(!shooter.active)return;
  ctx.globalCompositeOperation='screen';
  var ex=shooter.x-shooter.dx*shooter.len/13,ey=shooter.y-shooter.dy*shooter.len/13;
  var grad=ctx.createLinearGradient(shooter.x,shooter.y,ex,ey);
  grad.addColorStop(0,'rgba(255,255,255,'+(shooter.life*.85)+')');
  grad.addColorStop(1,'rgba(190,205,255,0)');
  ctx.strokeStyle=grad;ctx.lineWidth=1.4;
  ctx.beginPath();ctx.moveTo(shooter.x,shooter.y);ctx.lineTo(ex,ey);ctx.stroke();
  ctx.globalCompositeOperation='source-over';
  shooter.x+=shooter.dx;shooter.y+=shooter.dy;shooter.life-=.016;
  if(shooter.life<=0||shooter.x>W+120||shooter.y>H+120)shooter.active=false;
}

function frame(){
  T+=.016;
  ctx.clearRect(0,0,W,H);
  nebulas.forEach(drawNebula);
  stars.forEach(drawStar);
  maybeShooter();drawShooter();
  requestAnimationFrame(frame);
}

resize();
frame();
})();
</script>
</body>
</html>
