<!-- Self-hosted hls.js (no external CDN → works in WeChat) -->
<script src="hls.min.js"></script>
<script>
(function(){
/* ============================================================
 * HLS ADAPTIVE STREAMING ENGINE v9 (ABR + stall recovery)
 * - Video is MANDATORY: always attempt to load
 * - HLS with 3 adaptive renditions (1080p / 720p / 480p) → AUTO bitrate switching
 *   → weak networks drop to 480p instead of stalling
 *   → good networks upgrade to 1080p (full HD, peak quality)
 * - First segment at lowest rendition (480p) → instant first frame
 * - Self-hosted hls.min.js (same-origin, WeChat-safe)
 * - Native HLS for Safari/iOS; hls.js (MSE) for Chromium/WeChat/X5
 * - Self-hosted MP4 fallback (same Cloudflare CDN) if HLS entirely fails
 * - Stall recovery: if playback freezes, re-play + startLoad + downgrade level
 *   → fixes "stalls once and never resumes" on mobile
 * - WeChat X5 inline attributes so video renders as background
 * - Poster (Ken Burns) = buffering cover until video can play
 * - Tap-to-unlock for autoplay-blocked browsers
 * - Memory bounded: maxBufferLength=30s, backBuffer=15s
 * ============================================================ */

var V = document.getElementById('bgvideo');
var P = document.getElementById('poster');
var HLS_URL = 'playlist.m3u8'; // same-origin, in this folder

// Self-hosted MP4 (last-resort fallback). Sits on the SAME Cloudflare CDN as
// the page, so it is fast & reliable from China/WeChat. The old external NASA
// 54MB hotlink was the real reason mobile WeChat never showed video.
var MP4_FALLBACK = 'bg-fallback.mp4';

var state = {hls:null, revealed:false, fallbackTried:false};

// Crossfade poster → video
function revealVideo(){
  if(state.revealed) return;
  state.revealed = true;
  V.classList.add('visible');
  P.classList.remove('loading');
  P.style.animationPlayState='paused'; // pause Ken Burns when video takes over
  setTimeout(function(){ if(state.revealed) P.style.display='none'; },2200);
}

// Bind reveal to the FIRST of several "playable" events. WeChat/X5 can be
// finicky about which event actually fires for MSE/video streams, so we
// listen to loadeddata / canplay / playing and remove the others on fire.
var _revealBound=false;
function bindReveal(){
  if(_revealBound) return; _revealBound=true;
  ['loadeddata','canplay','playing'].forEach(function(ev){
    var h=function(){ try{V.removeEventListener(ev,h);}catch(e){} revealVideo(); };
    V.addEventListener(ev,h,false);
  });
}

// --- Try native HLS (Safari / iOS) ---
function tryNativeHls(){
  if(V.canPlayType('application/vnd.apple.mpegurl')){
    V.src = HLS_URL;
    V.addEventListener('loadedmetadata',function(){ V.play().catch(function(){}); },{once:true});
    bindReveal();
    // Safety net: if native HLS fails to load/play, fall back to hls.js → MP4
    V.addEventListener('error',function(){
      if(state.fallbackTried) return;
      cleanupHls();
      if(!tryHlsJs()) tryMp4Fallback();
    },{once:true});
    return true;
  }
  return false;
}

// --- Try hls.js (Chromium / WeChat / Firefox) ---
function tryHlsJs(){
  if(typeof Hls === 'undefined' || !Hls.isSupported()) return false;
  var hls = new Hls({
    capLevelToPlayerSize: false,  // NEVER reduce quality — HD always
    startLevel: -1,               // auto-pick highest (1080p)
    maxBufferLength: 30,          // smooth playback (30s ahead)
    maxMaxBufferLength: 60,
    maxBufferSize: 60*1000*1000,  // 60MB hard cap
    backBufferLength: 15,         // light on memory (looping background)
    abrEwmaDefaultEstimate: 5000000, // assume ~5Mbps → pick 1080p (user nets are good)
    abrBandWidthFactor: 0.95,     // conservative: leave headroom → avoid stalls
    abrBandWidthMinFactor: 0.70,
    fragLoadingMaxRetry: 15,      // resilient on flaky mobile nets
    fragLoadingRetryDelay: 500,
    manifestLoadingMaxRetry: 8,
    manifestLoadingRetryDelay: 500,
    enableWorker: true,           // demux off main thread (perf)
    nudgeOffset: 0.1,             // help WeChat/X5 media-timeline sync
    nudgeMaxRetry: 5,
    lowLatencyMode: false
  });
  state.hls = hls;
  hls.loadSource(HLS_URL);
  hls.attachMedia(V);
  hls.on(Hls.Events.MANIFEST_PARSED,function(){
    V.play().catch(function(){});
  });
  hls.on(Hls.Events.FRAG_BUFFERED,function(){ /* progressive playback */ });
  hls.on(Hls.Events.ERROR,function(ev,data){
    if(data.fatal){
      switch(data.type){
        case Hls.ErrorTypes.NETWORK_ERROR:
          hls.startLoad(); // auto-recover network
          break;
        case Hls.ErrorTypes.MEDIA_ERROR:
          hls.recoverMediaError();
          break;
        default:
          // unrecoverable → fall back to MP4
          cleanupHls();
          tryMp4Fallback();
      }
    }
  });
  bindReveal();
  return true;
}

function cleanupHls(){
  if(state.hls){ try{state.hls.destroy();}catch(e){} state.hls=null; }
}

// --- Stall recovery ---------------------------------------------------------
// Mobile WeChat background video often freezes once and NEVER resumes, because
// nothing re-triggers playback after a buffering pause. We watch for stalls and
// proactively recover: re-play + hls.startLoad() + downgrade one rendition.
var _stall = {last:0, stuck:0, timer:null};
function recoverPlayback(){
  try{ V.play().catch(function(){}); }catch(e){}
  if(state.hls){
    try{
      state.hls.startLoad();
      if(state.hls.levels && state.hls.currentLevel > 0){
        state.hls.nextLevel = Math.max(0, state.hls.currentLevel - 1);
      }
    }catch(e){}
  }
}
function setupStallRecovery(){
  ['stalled','waiting'].forEach(function(ev){
    V.addEventListener(ev, function(){ recoverPlayback(); }, false);
  });
  _stall.timer = setInterval(function(){
    if(V.paused || document.hidden){ _stall.stuck = 0; return; }
    if(V.readyState < 3){ // buffering / not enough data
      if(_stall.last !== 0 && Math.abs(V.currentTime - _stall.last) < 0.05){
        _stall.stuck++;
        if(_stall.stuck >= 2) recoverPlayback(); // ~5s frozen → recover
      } else { _stall.stuck = 0; }
    } else { _stall.stuck = 0; }
    _stall.last = V.currentTime;
  }, 2500);
}

// --- Last-resort: direct MP4 (progressive download) ---
function tryMp4Fallback(){
  if(state.fallbackTried) return;
  state.fallbackTried = true;
  console.log('[video] HLS failed → MP4 fallback');
  V.src = MP4_FALLBACK;
  bindReveal();
  V.load();
  V.play().catch(function(){});
  // If MP4 also fails, poster+canvas remains (still acceptable)
  V.addEventListener('error',function(){
    P.classList.remove('loading');
    P.style.animationPlayState='running';
  },{once:true});
}

// --- Tap-to-unlock (autoplay blocked by iOS/WeChat) ---
var _tapUnlocked=false;
function tryTapUnlock(){
  if(_tapUnlocked||state.revealed) return;
  _tapUnlocked=true;
  V.play().then(function(){ revealVideo(); }).catch(function(){});
}
document.addEventListener('touchstart',tryTapUnlock,{once:true});
document.addEventListener('click',tryTapUnlock,{once:true});

// --- Visibility: save bandwidth when hidden; recover when shown ---
document.addEventListener('visibilitychange',function(){
  if(document.hidden){try{V.pause();}catch(e){}}
  else{ recoverPlayback(); }
});

// --- Boot ---
(function boot(){
  function start(){
    setupStallRecovery();
    if(tryNativeHls()) return;
    if(tryHlsJs()) return;
    tryMp4Fallback();
  }
  if(document.readyState==='complete') start();
  else window.addEventListener('load',start);
})();

/* ============================================================
 * COSMIC CANVAS OVERLAY (stars / nebula / shooting stars)
 * Independent of video state; slightly richer on mobile
 * ============================================================ */
var c=document.getElementById('cosmos'),ctx=c.getContext('2d');
var W,H,T=0;
var stars=[],nebulas=[];

function resize(){W=c.width=innerWidth;H=c.height=innerHeight;initAll();}
window.addEventListener('resize',resize);
function rand(a,b){return a+Math.random()*(b-a);}

function initStars(){
  stars=[];
  var baseCount = W<=520 ? 420 : (W<=720 ? 360 : 300);
  for(var i=0;i<baseCount;i++)
    stars.push({x:rand(0,W),y:rand(0,H),r:rand(.15,.55),a:rand(.08,.42),sp:rand(.0003,.001),tw:rand(.8,1.4),ph:rand(0,Math.PI*2)});
  var bigCount = W<=520 ? 100 : 70;
  for(var i=0;i<bigCount;i++)
    stars.push({x:rand(0,W),y:rand(0,H),r:rand(.4,1.1),a:rand(.22,.55),sp:rand(.0008,.0018),tw:rand(1.2,2.2),ph:rand(0,Math.PI*2),big:true});
}
function initNebulas(){
  nebulas=[
    {x:W*.2,y:H*.18,r:Math.min(W,H)*.4,c:'rgba(90,60,200,',a:.055},
    {x:W*.8,y:H*.8,r:Math.min(W,H)*.32,c:'rgba(30,80,180,',a:.05},
    {x:W*.55,y:H*.4,r:Math.min(W,H)*.25,c:'rgba(150,50,130,',a:.04}
  ];
}
function initAll(){initStars();initNebulas();}

function drawNebula(n){
  ctx.globalCompositeOperation='screen';
  var g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
  g.addColorStop(0,n.c+n.a+')');g.addColorStop(1,n.c+'0)');
  ctx.fillStyle=g;ctx.fillRect(n.x-n.r,n.y-n.r,n.r*2,n.r*2);
  ctx.globalCompositeOperation='source-over';
}
function drawStar(s){
  var tw=Math.sin(T*s.tw+s.ph)*.5+.5;
  var al=s.a*(.35+tw*.65);
  ctx.globalAlpha=al;
  if(s.big){
    var g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*3.2);
    g.addColorStop(0,'rgba(225,230,255,1)');g.addColorStop(.4,'rgba(170,185,255,.35)');g.addColorStop(1,'rgba(150,170,255,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(s.x,s.y,s.r*3.2,0,Math.PI*2);ctx.fill();
  }else{
    ctx.fillStyle='#e6ebff';ctx.fillRect(s.x,s.y,s.r,s.r);
  }
  ctx.globalAlpha=1;
}

var shooter={active:false,x:0,y:0,dx:0,dy:0,life:0,len:0};
function maybeShooter(){
  if(!shooter.active&&Math.random()<.0025){
    shooter.active=true;shooter.x=rand(0,W*.7);shooter.y=rand(0,H*.45);
    var ang=rand(.18,.55);shooter.len=rand(70,180);
    shooter.dx=Math.cos(ang)*13;shooter.dy=Math.sin(ang)*13;shooter.life=1;
  }
}
function drawShooter(){
  if(!shooter.active)return;
  ctx.globalCompositeOperation='screen';
  var ex=shooter.x-shooter.dx*shooter.len/13,ey=shooter.y-shooter.dy*shooter.len/13;
  var grad=ctx.createLinearGradient(shooter.x,shooter.y,ex,ey);
  grad.addColorStop(0,'rgba(255,255,255,'+(shooter.life*.85)+')');
  grad.addColorStop(1,'rgba(190,205,255,0)');
  ctx.strokeStyle=grad;ctx.lineWidth=1.4;
  ctx.beginPath();ctx.moveTo(shooter.x,shooter.y);ctx.lineTo(ex,ey);ctx.stroke();
  ctx.globalCompositeOperation='source-over';
  shooter.x+=shooter.dx;shooter.y+=shooter.dy;shooter.life-=.016;
  if(shooter.life<=0||shooter.x>W+120||shooter.y>H+120)shooter.active=false;
}

function frame(){
  T+=.016;
  ctx.clearRect(0,0,W,H);
  nebulas.forEach(drawNebula);
  stars.forEach(drawStar);
  maybeShooter();drawShooter();
  requestAnimationFrame(frame);
}

resize();
frame();
})();
</script>
