name: Submit a Tool
description: Submit your web tool; once approved it goes live automatically and is recorded in the contributors list
title: "Tool Submission: "
labels: ["submission"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your submission! Fill in the info below. Once approved, your tool goes live automatically and is added to the contributors list.

        🌐 This is the **English** template. [中文模板 →](../../issues/new?template=tool-submission.yml)
  - type: input
    id: name
    attributes:
      label: Tool Name
      description: What is your web tool called?
    validations:
      required: true
  - type: textarea
    id: intro
    attributes:
      label: Brief Intro
      description: One-line description of your tool (shown on the card). External tools left blank show an empty card description; if the URL points to a tool already in this site's tools/, the submission is auto-ignored and the in-site version is used (see note below).
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        💡 **Already-hosted tools**: If your submission URL points to a tool that already exists under this site's `tools/`, the system auto-detects and ignores the duplicate — the page uses that tool's own description. What you fill in here ("Brief Intro" / "Features") won't affect its display. To update display info, edit the tool's folder page under `tools/` directly. External URLs (any reachable link) use what you fill in; left blank → empty card description. Code-upload submissions get their info auto-generated by the maintainer after deployment.
  - type: input
    id: url
    attributes:
      label: URL / Address
      description: The live address of your tool (your own website, any frontend hosting platform, GitHub Pages, CodePen, etc.). If the tool isn't deployed yet, leave this blank and upload the code as an attachment (see below).
      placeholder: https://example.com/my-tool  or  leave blank to upload code
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        📦 **Upload tool code (optional)**: If your tool isn't deployed anywhere yet, drag & drop or paste the code files as **attachments** to this issue (HTML / CSS / JS and related assets). Once approved, the maintainer deploys the code under this site's `tools/` directory to go live.

        > 💡 **Two ways to submit — pick one or use both**:
        > - **Fill in URL**: tool already has a live address → just provide the URL
        > - **Upload code**: tool not deployed → leave URL blank, attach the code → maintainer deploys it for you

  - type: textarea
    id: features
    attributes:
      label: Features / Description
      description: "Detailed description of what the tool does and how to use it (used for external tools; blank → empty card description). Note: submissions pointing to this site's tools/ are auto-deduplicated and this field won't affect the in-site version."
    validations:
      required: false
  - type: input
    id: display_name
    attributes:
      label: Display Name (optional)
      description: Name shown in the contributors list (blank → your GitHub login). Submitting a different name later with the same account updates the display name; blank keeps the existing one.
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        📝 Your identity is auto-detected from the **GitHub account** you submit with (no need to fill it in); submissions from the same account auto-merge into one contributor card. The displayed @handle defaults to your login; if you set a "Display Name" different from your login, that name is shown.

        🔄 **Rename rule**: Later submissions from the same account with an explicitly different "Display Name" or "Link Text" take your latest value; if left blank, the previously stored name is kept (it won't be overwritten by your login).

  - type: input
    id: website
    attributes:
      label: Website
      description: Personal homepage, team page, or organization address (optional)
    validations:
      required: false

  - type: input
    id: link_text
    attributes:
      label: Link Text (optional)
      description: 'Text shown on the homepage URL link (blank → uses "Display Name" or your GitHub login)'
