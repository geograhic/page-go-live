name: 工具投稿
description: 提交你的网页工具，审核通过后自动上线展示，并记入贡献者名单
title: "工具投稿："
labels: ["submission"]
body:
  - type: markdown
    attributes:
      value: |
        感谢投稿！请填写以下信息，我们审核通过后会自动上线并记入贡献者名单。
  - type: input
    id: name
    attributes:
      label: 工具名称
      description: 你的网页工具叫什么名字？
    validations:
      required: true
  - type: textarea
    id: intro
    attributes:
      label: 简介
      description: 用一句话介绍你的工具（会显示在卡片上）。若工具已在本站 tools/ 中且你留空，将自动采用工具本身的简介；你填写的内容优先。
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        💡 简介留空规则：如果工具已托管在本站 `tools/` 下，且你未填写「简介」与「功能描述」，系统会自动采用该工具自身的简介；只要你填了任意一项，就以你填写的为准。
  - type: input
    id: url
    attributes:
      label: 地址 / URL
      description: 工具托管地址（GitHub 仓库、GitHub Pages、CodePen 等可访问链接）
    validations:
      required: true
  - type: textarea
    id: features
    attributes:
      label: 功能描述
      description: 详细描述工具的功能与用途。若留空且工具已在本站 tools/ 中，将自动回退到工具本身的简介。
    validations:
      required: false
  - type: input
    id: github
    attributes:
      label: 作者署名
      description: 显示在贡献者名单中（留空则匿名）
    validations:
      required: false

  - type: input
    id: website
    attributes:
      label: 主页 URL
      description: 个人主页、团队页面或组织地址（可选）
    validations:
      required: false
