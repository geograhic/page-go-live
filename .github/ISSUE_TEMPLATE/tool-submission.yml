name: 工具投稿
description: 提交你的网页工具，审核通过后自动上线展示，并记入贡献者名单
title: "工具投稿："
labels: ["submission"]
body:
  - type: markdown
    attributes:
      value: |
        感谢投稿！请填写以下信息，我们审核通过后会自动上线并记入贡献者名单。
  - type: input
    id: name
    attributes:
      label: 工具名称
      description: 你的网页工具叫什么名字？
    validations:
      required: true
  - type: textarea
    id: intro
    attributes:
      label: 简介
      description: 用一句话介绍你的工具（会显示在卡片上）。若工具已在本站 tools/ 中且你留空，将自动采用工具本身的简介；你填写的内容优先。
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        💡 简介留空规则：如果工具已托管在本站 `tools/` 下，且你未填写「简介」与「功能描述」，系统会自动采用该工具自身的简介；只要你填了任意一项，就以你填写的为准。
  - type: input
    id: url
    attributes:
      label: 地址 / URL
      description: 工具托管地址（GitHub 仓库、GitHub Pages、CodePen 等可访问链接）
    validations:
      required: true
  - type: textarea
    id: features
    attributes:
      label: 功能描述
      description: 详细描述工具的功能与用途。若留空且工具已在本站 tools/ 中，将自动回退到工具本身的简介。
    validations:
      required: false
  - type: input
    id: display_name
    attributes:
      label: 显示名称（可选）
      description: 贡献者名单中展示的名字（留空则使用你的 GitHub 登录名）。同一账号再次投稿时显式填写不同名称会更新展示名；留空则保留已有名称。
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        📝 你的身份由投稿所用的 **GitHub 账号**自动识别（无需填写），同一账号投稿会自动合并到同一贡献者卡片。显示的 @标识 默认是你的登录名，若填写了「显示名称」且与登录名不同则显示该名称。

        🔄 **改名规则**：同一账号后续投稿若显式填写了不同的「显示名称」或「主页链接文字」，会以你最新填写的为准；若留空，则保留之前已有的名称（不会被登录名覆盖）。

  - type: input
    id: website
    attributes:
      label: 主页 URL
      description: 个人主页、团队页面或组织地址（可选）
    validations:
      required: false

  - type: input
    id: link_text
    attributes:
      label: 主页链接文字（可选）
      description: 主页 URL 链接上显示的文字（留空则使用「显示名称」或你的登录名）
