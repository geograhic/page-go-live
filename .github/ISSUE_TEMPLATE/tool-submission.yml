name: 工具投稿
description: 提交你的网页工具，审核通过后自动上线展示，并记入贡献者名单
title: "工具投稿："
labels: ["submission"]
body:
  - type: markdown
    attributes:
      value: |
        感谢投稿！请填写以下信息，我们审核通过后会自动上线并记入贡献者名单。
  - type: input
    id: name
    attributes:
      label: 工具名称
      description: 你的网页工具叫什么名字？
    validations:
      required: true
  - type: textarea
    id: intro
    attributes:
      label: 简介
      description: 用一句话介绍你的工具（会显示在卡片上）。站外工具留空则卡片描述为空白；若地址指向本站已存在的 tools/ 工具，投稿会被自动忽略、以站内版本为准（见下方说明）。
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        💡 已托管工具：若投稿地址指向本站已存在的 `tools/` 工具，系统会自动识别并忽略重复投稿，页面以该工具自身的简介为准；你在此表单填写的「简介 / 功能描述」不会影响其展示。若要更新展示信息，请直接修改 `tools/` 下对应文件夹的页面。站外地址（任意可访问链接）则以你填写的「简介 / 功能描述」为准，留空则卡片描述为空白。上传代码的投稿将由维护者部署后自动生成信息。
  - type: input
    id: url
    attributes:
      label: 地址 / URL
      description: 工具的访问地址（你的网站、任意前端托管平台、GitHub Pages、CodePen 等均可）。若工具尚未部署，可留空并直接上传代码附件（见下方说明）。
      placeholder: https://example.com/my-tool 或留空上传代码
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        📦 **工具代码上传（可选）**：如果你的工具尚未部署到任何地址，可以直接将工具代码文件作为**附件**拖拽/粘贴到此 Issue 中（支持 HTML / CSS / JS 及相关资源文件）。审核通过后，维护者会将代码部署到本站 `tools/` 目录下上线展示。

        > 💡 **两种提交方式任选其一或同时使用**：
        > - **填写地址**：工具已有在线地址 → 填写 URL 即可
        > - **上传代码**：工具未部署 → 留空地址，上传代码附件 → 维护者代为部署到本站

  - type: textarea
    id: features
    attributes:
      label: 功能描述
      description: 详细描述工具的功能与用途（站外工具以此为准；留空则卡片描述为空白）。注意：指向本站 tools/ 的投稿会被自动忽略重复，此栏不影响站内版本。
    validations:
      required: false
  - type: input
    id: display_name
    attributes:
      label: 显示名称（可选）
      description: 贡献者名单中展示的名字（留空则使用你的 GitHub 登录名）。同一账号再次投稿时显式填写不同名称会更新展示名；留空则保留已有名称。
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        📝 你的身份由投稿所用的 **GitHub 账号**自动识别（无需填写），同一账号投稿会自动合并到同一贡献者卡片。显示的 @标识 默认是你的登录名，若填写了「显示名称」且与登录名不同则显示该名称。

        🔄 **改名规则**：同一账号后续投稿若显式填写了不同的「显示名称」或「主页链接文字」，会以你最新填写的为准；若留空，则保留之前已有的名称（不会被登录名覆盖）。

  - type: input
    id: website
    attributes:
      label: 主页 URL
      description: 个人主页、团队页面或组织地址（可选）
    validations:
      required: false

  - type: input
    id: link_text
    attributes:
      label: 主页链接文字（可选）
      description: 主页 URL 链接上显示的文字（留空则使用「显示名称」或你的登录名）
