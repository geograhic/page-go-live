name: 工具投稿
description: 提交你的网页工具，审核通过后自动上线展示，并记入贡献者名单
title: "工具投稿："
labels: ["submission"]
body:
  - type: markdown
    attributes:
      value: |
        感谢投稿！请填写以下信息，我们审核通过后会自动上线并记入贡献者名单。
  - type: input
    id: name
    attributes:
      label: 工具名称
      description: 你的网页工具叫什么名字？
    validations:
      required: true
  - type: textarea
    id: intro
    attributes:
      label: 简介
      description: 用一句话介绍你的工具（会显示在卡片上）
    validations:
      required: false
  - type: input
    id: url
    attributes:
      label: 地址 / URL
      description: 工具托管地址（GitHub 仓库、GitHub Pages、CodePen 等可访问链接）
    validations:
      required: true
  - type: textarea
    id: features
    attributes:
      label: 功能描述
      description: 详细描述工具的功能与用途
    validations:
      required: false
  - type: input
    id: github
    attributes:
      label: 作者署名
      description: 显示在贡献者名单中（留空则匿名）
    validations:
      required: false

  - type: input
    id: website
    attributes:
      label: 你的主页 URL
      description: 你的个人主页地址（可选）
    validations:
      required: false
