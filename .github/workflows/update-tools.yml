name: 更新工具清单

on:
  push:
    branches: [ main ]
    paths:
      - 'tools/**'
      - 'scripts/generate-tools-json.js'
      - 'external-tools.json'
      - 'authors.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-tools:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 生成工具清单
        run: node scripts/generate-tools-json.js

      - name: 安装图标栅格化依赖（不提交）
        run: npm install --no-save sharp png-to-ico

      - name: 生成各工具级 favicon.ico
        run: node scripts/gen-tool-favicons.mjs

      - name: 检查是否有变化
        id: check
        run: |
          if git diff --quiet tools.json 'tools/*/favicon.ico'; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 提交更改
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools.json 'tools/*/favicon.ico'
          git commit -m "chore: 自动更新工具清单 / 生成工具级 favicon.ico"
          git push
