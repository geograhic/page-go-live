name: Sync favicon.ico from favicon.svg

# 当站点主图标 favicon.svg 变动时，自动把兜底用的 favicon.ico 重新栅格化，
# 保证「无自身图标的工具页」回退到的站点图标不会过期。
# 只监听 favicon.svg，回写 favicon.ico 不会再次触发本工作流（无死循环）。
on:
  push:
    branches: [main]
    paths:
      - 'favicon.svg'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install rasterizer (no-save, not committed)
        run: npm install --no-save sharp png-to-ico
      - name: Regenerate favicon.ico
        run: node scripts/gen-favicon.mjs
      - name: Commit back if changed
        run: |
          if ! git diff --quiet favicon.ico; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add favicon.ico
            git commit -m "chore: regenerate favicon.ico from updated favicon.svg"
            git push
          else
            echo "favicon.ico 未变化，跳过提交"
          fi
